# Change the app name below to something unique on fly.io
# Run: fly launch --no-deploy  (to register the app name)
# Then: fly secrets set TELEGRAM_BOT_TOKEN=... DATABASE_URL=...
# Then: fly deploy

app = "comp-center-bot"
primary_region = "ams"

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/healthz"
timeout = "5s"

[env]
PORT = "8080"
NODE_ENV = "production"

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
